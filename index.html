<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門店快捷打卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif; text-align: center;">
  <h2 id="welcome-msg">正在載入系統...</h2>
  <div id="controls" style="display:none;">
    <button onclick="handlePunch('上班')" style="font-size: 20px; padding: 15px 40px; margin: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 8px;">上班打卡</button><br>
    <button onclick="handlePunch('下班')" style="font-size: 20px; padding: 15px 40px; margin: 10px; background-color: #f44336; color: white; border: none; border-radius: 8px;">下班打卡</button>
  </div>
  <p id="status-text" style="color: #666; margin-top: 20px;"></p>

  <script>
    const MY_LIFF_ID = "2010498585-88IzHp5i";
    const GAS_API_URL = "https://docs.google.com/spreadsheets/d/1VcZ1G1r6chHgn9hsX0OXZNGWUw4rfuuKdOXNd98SPZk/edit"; // <--- 記得修改這裡！

    const stores = [
      {name: "關西工廠", lat: 24.793893, lng: 121.189016},
      {name: "大昌店", lat: 24.864896, lng: 121.222429},
      {name: "桃園店", lat: 24.997048, lng: 121.306013},
      {name: "中壢店", lat: 24.956362, lng: 121.223104},
      {name: "中正店", lat: 24.869475, lng: 121.214192},
      {name: "中豐店", lat: 24.869853, lng: 121.214045},
      {name: "龍福店", lat: 24.864999, lng: 121.222814},
      {name: "大溪店", lat: 24.897105, lng: 121.278713}
    ];

    let userName = "";

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function handlePunch(action) {
      document.getElementById('status-text').innerText = "正在進行定位核對...";
      
      navigator.geolocation.getCurrentPosition(pos => {
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;
        
        let isNear = stores.some(s => getDistance(lat, lng, s.lat, s.lng) <= 100);
        
        if (false) {
          alert("⚠️ 打卡失敗：您目前不在門市 100 公尺範圍內！");
          document.getElementById('status-text').innerText = "定位失敗：距離門市過遠。";
          return;
        }

        let finalUrl = `${GAS_API_URL}?name=${encodeURIComponent(userName)}&action=${encodeURIComponent(action)}&lat=${lat}&lng=${lng}`;
        fetch(finalUrl).then(r => r.json()).then(data => {
          document.getElementById('status-text').innerText = data.message;
          if(data.status === "success") setTimeout(() => liff.closeWindow(), 2000);
        });
      }, (err) => {
        alert("定位失敗！請確認：\n1. 已開啟 GPS\n2. LINE 已允許位置存取\n錯誤碼: " + err.code);
        document.getElementById('status-text').innerText = "請允許位置存取權限。";
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    liff.init({ liffId: MY_LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) liff.login();
      else liff.getProfile().then(p => {
        userName = p.displayName;
        document.getElementById('welcome-msg').innerText = "哈囉，" + userName + "！";
        document.getElementById('controls').style.display = "block";
      });
    });
  </script>
</body>
</html>
