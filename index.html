<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>極簡測試版</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; text-align: center;">
  <h2 id="msg">正在測試定位...</h2>
  <script>
    const GAS_URL = "https://docs.google.com/spreadsheets/d/1VcZ1G1r6chHgn9hsX0OXZNGWUw4rfuuKdOXNd98SPZk/edit"; // 記得貼上！

    liff.init({ liffId: "2010498585-88IzHp5i" }).then(() => {
      liff.getProfile().then(p => {
        if (!navigator.geolocation) {
          document.getElementById('msg').innerText = "不支援定位";
          return;
        }
        document.getElementById('msg').innerText = "正在取得 GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
          let lat = pos.coords.latitude;
          let lng = pos.coords.longitude;
          document.getElementById('msg').innerText = "定位成功: " + lat + ", " + lng;
          
          // 直接送出資料，不跑防呆
          fetch(`${GAS_URL}?name=${encodeURIComponent(p.displayName)}&action=測試&lat=${lat}&lng=${lng}`)
            .then(r => r.json())
            .then(d => document.getElementById('msg').innerText = "傳送結果: " + d.message);
        }, err => {
          document.getElementById('msg').innerText = "定位失敗代碼: " + err.code;
        }, { enableHighAccuracy: true });
      });
    });
  </script>
</body>
</html>
