<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>階段整合測試</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; text-align: center;">
  <h2 id="msg">請按下打卡按鈕測試</h2>
  <button onclick="testPunch()" style="font-size: 20px; padding: 20px;">測試門市定位</button>

  <script>
    const stores = [
      {name: "關西工廠", lat: 24.793893, lng: 121.189016} // 先測一間就好
    ];

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function testPunch() {
      document.getElementById('msg').innerText = "正在計算...";
      navigator.geolocation.getCurrentPosition(pos => {
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;
        let dist = getDistance(lat, lng, stores[0].lat, stores[0].lng);
        document.getElementById('msg').innerText = "緯度:" + lat.toFixed(4) + " 距離:" + Math.round(dist) + "公尺";
      }, err => {
        document.getElementById('msg').innerText = "錯誤: " + err.code;
      }, { enableHighAccuracy: true });
    }
  </script>
</body>
</html>
