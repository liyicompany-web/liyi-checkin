<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>門店快捷打卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="padding: 20px; font-family: sans-serif; text-align: center;">
  <h2 id="welcome-msg">正在載入系統...</h2>
  
  <div id="controls" style="display:none; margin-top: 30px;">
    <button onclick="handlePunch('上班')" style="font-size: 20px; padding: 15px 40px; margin: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 8px;">上班打卡</button><br>
    <button onclick="handlePunch('下班')" style="font-size: 20px; padding: 15px 40px; margin: 10px; background-color: #f44336; color: white; border: none; border-radius: 8px;">下班打卡</button>
  </div>
  
  <p id="status-text" style="font-weight: bold; margin-top: 20px; font-size: 16px;"></p>

  <script>
    // ▼▼▼ 1. 請填入你在 LINE Developers 申請的 LIFF ID ▼▼▼
    const MY_LIFF_ID = "2010498585-88IzHp5i"; 

    // ▼▼▼ 2. 請貼上你剛剛在第一步拿到的全新 Google Apps Script URL ▼▼▼
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbygHNPtauU-l3f1JTFi9vucwliq--Y91kVkJwSawz41ERn9g1YN_LzRlRAriCjvWzWgOA/exec"; 

    let userName = "";

    async function initLiff() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          userName = profile.displayName;
          document.getElementById('welcome-msg').innerText = "哈囉，" + userName + "！";
          document.getElementById('controls').style.display = "block";
        }
      } catch (error) {
        document.getElementById('status-text').innerText = "系統初始化失敗，請確保在 LINE 內部開啟。";
      }
    }

    function handlePunch(action) {
      document.getElementById('status-text').innerText = "正在定位並傳送資料...";
      
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          let lat = position.coords.latitude;
          let lng = position.coords.longitude;
          
          // 透過網址將資料傳送給 Google 試算表
          let finalUrl = `${GAS_API_URL}?name=${encodeURIComponent(userName)}&action=${encodeURIComponent(action)}&lat=${lat}&lng=${lng}`;
          
          fetch(finalUrl)
            .then(response => response.json())
            .then(data => {
              if(data.status === "success") {
                document.getElementById('status-text').innerText = data.message;
                setTimeout(() => { liff.closeWindow(); }, 2000);
              } else {
                document.getElementById('status-text').innerText = "寫入失敗，請稍後再試。";
              }
            })
            .catch(error => { document.getElementById('status-text').innerText = "網路連線異常"; });
            
        }, function(error) {
          document.getElementById('status-text').innerText = "定位失敗，請確認手機 GPS 已開啟。";
        });
      }
    }

    window.onload = initLiff;
  </script>
</body>
</html>
